spring.application.name=registration
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/car_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:car_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:car_pass}
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/cardpgbackend}
frontend.urls=${FRONTEND_URLS:http://localhost:5173}

#Configs geo-calculation
cardpg.engine.base-url=${CARDPG_ENGINE_BASE_URL:http://geo-calculation-engine-app:8080/engine/api}
cardpg.engine.workflow=${CARDPG_ENGINE_WORKFLOW:CAR_DPG}
cardpg.engine.timeout.connect-ms=${CARDPG_ENGINE_TIMEOUT_CONNECT:3000}
cardpg.engine.timeout.read-ms=${CARDPG_ENGINE_TIMEOUT_READ:60000}

management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator
management.endpoint.health.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
